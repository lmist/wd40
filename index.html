<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wd40</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div id="tab-bar"></div>
    <div id="app">
      <div id="editor-pane"></div>
      <div id="divider"></div>
      <div id="mindmap-pane">
        <svg id="markmap"></svg>
        <div id="toolbar">
          <button id="btn-theme" title="Toggle light/dark theme">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="8" cy="8" r="3.5"/>
              <path d="M8 1.5v1.5M8 13v1.5M1.5 8H3M13 8h1.5M3.4 3.4l1.1 1.1M11.5 11.5l1.1 1.1M3.4 12.6l1.1-1.1M11.5 4.5l1.1-1.1"/>
            </svg>
          </button>
          <button id="btn-fit" title="Fit to view (⌘⇧F)">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="2" y="2" width="12" height="12" rx="2"/>
              <path d="M5 2v3H2M14 5h-3V2M11 14v-3h3M2 11h3v3"/>
            </svg>
          </button>
          <button id="btn-zoom-in" title="Zoom in">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="7" cy="7" r="5"/><path d="M11 11l3.5 3.5M7 4.5v5M4.5 7h5"/>
            </svg>
          </button>
          <button id="btn-zoom-out" title="Zoom out">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="7" cy="7" r="5"/><path d="M11 11l3.5 3.5M4.5 7h5"/>
            </svg>
          </button>
          <button id="btn-expand-all" title="Expand all">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M3 6l5 5 5-5"/>
              <path d="M3 2l5 5 5-5"/>
            </svg>
          </button>
          <button id="btn-collapse-all" title="Collapse all">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M3 10l5-5 5 5"/>
              <path d="M3 14l5-5 5 5"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
    <div id="statusbar">
      <span id="vim-mode">NORMAL</span>
      <span id="resize-badge">RESIZE</span>
      <span id="file-name">untitled.md</span>
      <span class="statusbar-spacer"></span>
      <select id="theme-picker" title="Color theme"></select>
      <select id="font-picker" title="Monospace font"></select>
      <button id="btn-vimrc" title="Edit .vimrc">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M13.5 5.5l-3-3L3 10v3h3l7.5-7.5z"/>
          <path d="M10.5 2.5l3 3"/>
        </svg>
        .vimrc
      </button>
    </div>

    <!-- .vimrc settings modal -->
    <div id="vimrc-overlay" class="vimrc-overlay hidden">
      <div class="vimrc-modal">
        <div class="vimrc-header">
          <span class="vimrc-title">.vimrc</span>
          <button id="vimrc-close" class="vimrc-close">&times;</button>
        </div>
        <textarea id="vimrc-editor" spellcheck="false" placeholder="&quot; Example vimrc commands:&#10;&quot; imap jj &lt;Esc&gt;&#10;&quot; set clipboard=unnamed&#10;&quot; nmap ; :"></textarea>
        <div class="vimrc-footer">
          <span class="vimrc-hint">Applied on save. One ex command per line.</span>
          <button id="vimrc-save">Save &amp; Apply</button>
        </div>
      </div>
    </div>
  </body>
</html>
